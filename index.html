<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym App PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">

    <header>
      <h1>🏋️ Gym PRO</h1>
      <p id="fecha"></p>
    </header>

    <div class="card">
      <h2>🧠 Modo Coach</h2>

      <h3 id="ejercicioNombre">Ejercicio</h3>
      <p id="ejercicioInfo">Series x Reps</p>
      <p id="pesoInfo">Peso</p>

      <button onclick="iniciarEntrenamiento()">▶️ Iniciar</button>
      <button onclick="completarSerie()">✅ Completar serie</button>

      <p id="contadorSeries"></p>
      <p id="timer"></p>
    </div>

    <div class="card">
      <h2>🔥 Entrenamiento de hoy</h2>
      <p id="rutinaHoy"></p>
      <button onclick="mostrarEjercicios()">Ver ejercicios</button>
    </div>

    <div class="card hidden" id="ejerciciosCard">
      <h2>💪 Ejercicios</h2>
      <ul id="listaEjercicios"></ul>
      <button onclick="marcarCompletado()">✅ Terminé</button>
    </div>

    <div class="card">
      <h2>📈 Progreso</h2>
      <input type="number" id="dominadas" placeholder="Dominadas hoy">
      <button onclick="guardarProgreso()">Guardar</button>
    </div>

    <div class="card">
      <h2>📜 Historial</h2>
      <pre id="historial"></pre>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>

</html>
